<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codes</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#003A70">
  <link rel="apple-touch-icon" href="codes-192.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #003A70;
      color: white;
    }

    header {
      background: #003A70;
      color: white;
      padding: 15px;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #FFC800;
    }

    #homeBtn, #backBtn {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
    }

    .hidden { display: none; }

    .menu-list, .steps-list {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-btn {
      padding: 15px;
      font-size: 18px;
      border: none;
      background: #FFC800;
      color: #003A70;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .step {
      background: #FFC800;
      padding: 15px;
      border-radius: 8px;
      font-size: 18px;
      color: #003A70;
      border-left: 5px solid white;
      font-weight: bold;
    }

    /* TELEPÍTŐ OVERLAY */
    #installOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #installBox {
      background: #003A70;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 85%;
      max-width: 350px;
      border: 2px solid #FFC800;
    }

    #installBtn, #closeInstall {
      background: #FFC800;
      color: #003A70;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<!-- TELEPÍTŐ OVERLAY -->
<div id="installOverlay">
  <div id="installBox">
    <h2>Codes installieren</h2>
    <p>Füge die App zum Home-Bildschirm hinzu.</p>

    <button id="installBtn" onclick="showIOSHelp()">📲 Anleitung anzeigen</button>
    <button id="closeInstall" onclick="closeInstaller()">Später</button>
  </div>
</div>

<!-- iPhone telepítési segítség -->
<div id="iosHelp" class="hidden" style="
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#003A70; color:white; padding:25px; text-align:center; z-index:9999;
">
  <h3>iPhone Installation</h3>
  <p style="font-size:17px;">
    1. Tippe unten auf das <b>Teilen</b> Symbol.<br>
    2. Wähle <b>Zum Home-Bildschirm</b>.<br>
    3. Fertig – die App erscheint auf deinem Startbildschirm.
  </p>

  <button onclick="hideIOSHelp()" style="
    background:#FFC800; color:#003A70; padding:12px 20px;
    border:none; border-radius:8px; font-size:16px; font-weight:bold; cursor:pointer;
  ">Zurück</button>
</div>

<script>
  function closeInstaller(){
    document.getElementById('installOverlay').style.display = 'none';
    localStorage.setItem('codesInstallShown', 'yes');
  }

  function showIOSHelp(){
    document.getElementById('iosHelp').classList.remove('hidden');
  }

  function hideIOSHelp(){
    document.getElementById('iosHelp').classList.add('hidden');
  }

  // Telepítő csak egyszer jelenjen meg
  if(localStorage.getItem('codesInstallShown') === 'yes'){
    document.getElementById('installOverlay').style.display = 'none';
  }
</script>

<!-- FŐ APP -->
<header>
  <button id="homeBtn" onclick="goHome()">🏠</button>
  <button id="backBtn" class="hidden" onclick="goBack()">←</button>
  <div id="title">Codes</div>
</header>

<div id="content"></div>

<script>
  const historyStack = [];

  function setTitle(t){ document.getElementById('title').textContent = t; }
  function showBack(b){ document.getElementById('backBtn').classList.toggle('hidden', !b); }

  function render(html){ document.getElementById('content').innerHTML = html; }

  function goHome(){
    historyStack.length = 0;
    setTitle('Hauptseite');
    showBack(false);
    render(`
      <div class="menu-list">
        <button class="menu-btn" onclick="openHallenaufnahme()">1 – Hallenaufnahme</button>
        <button class="menu-btn" onclick="openWareneingang()">2 – Wareneingang</button>
      </div>
    `);
  }

  function goBack(){
    if(historyStack.length===0){ goHome(); return; }
    const last = historyStack.pop();
    last();
  }

  /* --- MENÜK --- */
  function openWareneingang(){
    historyStack.push(goHome);
    setTitle('Wareneingang');
    showBack(true);
    render(`
      <div class="menu-list">
        <button class="menu-btn" onclick="openWE3()">Wareneingang Prozess</button>
        <button class="menu-btn" onclick="openWEF7()">Wareneingang F7 Prozess</button>
      </div>
    `);
  }

  function openWE3(){
    historyStack.push(openWareneingang);
    setTitle('Wareneingang Prozess');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">Barcode scannen → ENTER</div>
        <div class="step">Scanner zeigt Info (Tour + Platz)</div>
        <div class="step">Platznummer auf Palette schreiben</div>
        <div class="step">Palette auf richtigen Platz stellen</div>
        <div class="step">ENTER</div>
      </div>
    `);
  }

  function openWEF7(){
    historyStack.push(openWareneingang);
    setTitle('Wareneingang F7 Prozess');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">1 → ENTER</div>
        <div class="step">F7 drücken</div>
        <div class="step">Barcode scannen → ENTER → ENTER → ENTER</div>
        <div class="step">Nochmal scannen</div>
      </div>
    `);
  }

  function openHallenaufnahme(){
    historyStack.push(goHome);
    setTitle('5.5.1 – Auswahl');
    showBack(true);
    render(`
      <div class="menu-list">
        <button class="menu-btn" onclick="openCode5()">5 – 2. Tour / Freigegeben</button>
        <button class="menu-btn" onclick="openCode6()">6 – Rausladen</button>
        <button class="menu-btn" onclick="openCode7()">7 – Entladen</button>
        <button class="menu-btn" onclick="openCode8()">8 – Sonderprozess Start</button>
        <button class="menu-btn" onclick="openCode9()">9 – Sonderprozess Ende</button>
        <button class="menu-btn" onclick="openCode13()">13 – Hallenaufnahme</button>
        <button class="menu-btn" onclick="openCode15()">15 – Platzwechseln</button>
      </div>
    `);
  }

  function openCode5(){
    historyStack.push(openHallenaufnahme);
    setTitle('5 – 2. Tour / Freigegeben');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">5 → ENTER</div>
        <div class="step">5 → ENTER</div>
        <div class="step">1 → ENTER</div>
        <div class="step">5 → ENTER</div>
      </div>
    `);
  }

  function openCode6(){
    historyStack.push(openHallenaufnahme);
    setTitle('6 – Rausladen');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">5 → ENTER</div>
        <div class="step">6 → ENTER</div>
      </div>
    `);
  }

  function openCode7(){
    historyStack.push(openHallenaufnahme);
    setTitle('7 – Entladen');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">7 → ENTER</div>
      </div>
    `);
  }

  function openCode8(){
    historyStack.push(openHallenaufnahme);
    setTitle('8 – Sonderprozess Start');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">8 → ENTER</div>
      </div>
    `);
  }

  function openCode9(){
    historyStack.push(openHallenaufnahme);
    setTitle('9 – Sonderprozess Ende');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">9 → ENTER</div>
      </div>
    `);
  }

  function openCode13(){
    historyStack.push(openHallenaufnahme);
    setTitle('13 – Hallenaufnahme');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">13 → ENTER</div>
      </div>
    `);
  }

  function openCode15(){
    historyStack.push(openHallenaufnahme);
    setTitle('15 – Platzwechseln');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">15 → ENTER</div>
      </div>
    `);
  }

  goHome();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>

</body>
</html>
