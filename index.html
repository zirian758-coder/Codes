<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Dachser – Scanner Menü</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#003A70" />

  <style>
    :root {
      --blue: #003A70;
      --blue-dark: #00284D;
      --yellow: #FFCC00;
    }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--blue);
      color: var(--yellow);
    }
    .topbar {
      background: var(--blue-dark);
      display: flex;
      align-items: center;
      padding: 12px 16px;
    }
    .icon-btn {
      font-size: 26px;
      color: var(--yellow);
      cursor: pointer;
      border: none;
      background: none;
    }
    .title {
      flex: 1;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: var(--yellow);
    }
    #content {
      padding: 16px;
    }
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .menu-btn {
      background: var(--yellow);
      color: var(--blue);
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      text-align: left;
    }
    .steps-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .step {
      background: var(--yellow);
      color: var(--blue);
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
    }
    #backBtn {
      position: fixed;
      bottom: 16px;
      left: 16px;
      font-size: 30px;
      color: var(--yellow);
      cursor: pointer;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="topbar">
    <button id="homeBtn" class="icon-btn" onclick="goHome()">🏠</button>
    <div id="title" class="title">Hauptseite</div>
    <span style="width:26px;"></span>
  </div>

  <div id="content"></div>
  <div id="backBtn" onclick="goBack()" class="hidden">⬅️</div>

  <script>
    const historyStack = [];

    function setTitle(t){ document.getElementById('title').textContent = t; }
    function showBack(b){ document.getElementById('backBtn').classList.toggle('hidden', !b); }
    function render(html){ document.getElementById('content').innerHTML = html; }

    function goHome(){
      historyStack.length = 0;
      setTitle('Hauptseite');
      showBack(false);
      render(`
        <div class="menu-list">
          <button class="menu-btn" onclick="openHallenaufnahme()">1 – Hallenaufnahme</button>
          <button class="menu-btn" onclick="openAuslagerung()">2 – Auslagerung</button>
          <button class="menu-btn" onclick="openKommissionierung()">3 – Kommissionierung</button>
          <button class="menu-btn" onclick="openRetouren()">4 – Retouren</button>
          <button class="menu-btn" onclick="openScannerFehler()">5 – Scanner Fehler / Codes</button>
          <button class="menu-btn" onclick="openPlatzCodes()">6 – Platz Codes</button>
        </div>
      `);
    }

    function goBack(){
      if(historyStack.length===0){ goHome(); return; }
      const last = historyStack.pop();
      last();
    }

    // --- Hallenaufnahme Menü ---
    function openHallenaufnahme(){
      historyStack.push(goHome);
      setTitle('5.5.1 – Auswahl');
      showBack(true);
      render(`
        <div class="menu-list">
          <button class="menu-btn" onclick="openCode5()">5 – 2. Tour / Freigegeben</button>
          <button class="menu-btn" onclick="openCode6()">6 – Rausladen</button>
          <button class="menu-btn" onclick="openCode7()">7 – Entladen</button>
          <button class="menu-btn" onclick="openCode8()">8 – Sonderprozess Start</button>
          <button class="menu-btn" onclick="openCode9()">9 – Sonderprozess Ende</button>
          <button class="menu-btn" onclick="openCode13()">13 – Hallenaufnahme</button>
          <button class="menu-btn" onclick="openCode15()">15 – Platzwechseln</button>
        </div>
      `);
    }

    // --- 5 ---
    function openCode5(){
      historyStack.push(openHallenaufnahme);
      setTitle('5 – 2. Tour / Freigegeben');
      showBack(true);
      render(`
        <div class="steps-list">
          <div class="step">5 → ENTER</div>
          <div class="step">5 → ENTER</div>
          <div class="step">1 → ENTER</div>
          <div class="step">5 → ENTER</div>
          <div class="step">Barcode scannen → ENTER</div>
          <div class="step">Scanner zeigt Info (Tour + Platz)</div>
          <div class="step">Palette auf Platz stellen → ENTER</div>
          <div class="step">Platz eingeben (z. B. 226) → ENTER</div>
          <div class="step">Nächste Palette gleich machen</div>
        </div>
      `);
    }

    // --- 6 ---
    function openCode6(){
      historyStack.push(openHallenaufnahme);
      setTitle('6 – Rausladen');
      showBack(true);
      render(`
        <div class="steps-list">
          <div class="step">5 → ENTER</div>
          <div class="step">5 → ENTER</div>
          <div class="step">1 → ENTER</div>
          <div class="step">6 → ENTER</div>
          <div class="step">Barcode scannen → ENTER</div>
          <div class="step">Brücke‑Nummer eingeben / QR‑Code scannen → ENTER</div>
        </div>
      `);
    }

    // --- 7 ---
    function openCode7(){
      historyStack.push(openHallenaufnahme);
      setTitle('7 – Entladen');
      showBack(true);
      render(`
        <div class="steps-list">
          <div class="step">5 → ENTER</div>
          <div class="step">5 → ENTER</div>
          <div class="step">1 → ENTER</div>
          <div class="step">7 → ENTER</div>
          <div class="step">Barcode scannen → ENTER</div>
          <div class="step">Scanner zeigt Platz (z. B. 360)</div>
          <div class="step">Palette auf Platz stellen → ENTER</div>
          <div class="step">Platz eingeben (360) → ENTER</div>
          <div class="step">Nächste Palette gleich machen</div>
        </div>
      `);
    }

    // --- 8 ---
    function openCode8(){
      historyStack.push(openHallenaufnahme);
      setTitle('8 – Sonderprozess Start');
      showBack(true);
      render(`
        <div class="steps-list">
          <div class="step">5 → ENTER</div>
          <div class="step">5 → ENTER</div>
          <div class="step">1 → ENTER</div>
          <div class="step">8 → ENTER</div>
          <div class="step">Barcode scannen → ENTER</div>
          <div class="step">Scanner schreibt: Barcode ist überzählig → ENTER</div>
          <div class="step">F10 drücken</div>
          <div class="step">Option wählen (z. B. 9 – Reinigung) → ENTER</div>
        </div>
      `);
    }

    // --- 9 ---
    function openCode9(){
      historyStack.push(openHallenaufnahme);
      setTitle('9 – Sonderprozess Ende');
      showBack(true);
      render(`
        <div class="steps-list">
          <div class="step">5 → ENTER</div>
          <div class="step">5 → ENTER</div>
          <div class="step">1 → ENTER</div>
          <div class="step">9 → ENTER</div>
          <div class="step">Gleichen Barcode scannen wie im Start → ENTER</div>
          <div class="step">Scanner schreibt: Barcode ist überzählig → ENTER</div>
          <div class="step">F10 drücken</div>
          <div class="step">Option wählen (z. B. 9 – Reinigung) → ENTER</div>
        </div>
      `);
    }

    // --- 13 ---
    function openCode13(){
      historyStack.push(openHallenaufnahme);
      setTitle('13 – Hallenaufnahme');
      showBack(true);
      render(`
        <div class="steps-list">
          <div class="step">5 → ENTER</div>
          <div class="step">5 → ENTER</div>
          <div class="step">1 → ENTER</div>
          <div class="step">13 → ENTER</div>
          <div class="step">Barcode scannen → ENTER</div>
          <div class="step">Scanner zeigt Tour + Platz (z. B. 9336 / 220)</div>
          <div class="step">Wenn 2. Tour / Freigegeben → letzte 2 Tour-Zahlen auf Palette schreiben → ENTER</div>
          <div class="step">Platz eingeben (z. B. 220) → ENTER</div>
        </div>
      `);
    }

    // --- 15 ---
    function openCode15(){
      historyStack.push(openHallenaufnahme);
      setTitle('15 – Platzwechseln');
      showBack(true);
      render(`
        <div class="steps-list">
          <div class="step">5 → ENTER</div>
          <div class="step">5 → ENTER</div>
          <div class="step">1 → ENTER</div>
          <div class="step">15 → ENTER</div>
          <div class="step">Barcode scannen → ENTER</div>
          <div class="step">Scanner zeigt Info (Tour + Platz)</div>
          <div class="step">Platz 224–225 voll → freien Platz suchen</div>
          <div class="step">Palette auf freien Platz stellen → ENTER</div>
          <div class="step">Platz eingeben (z. B. 227) → ENTER</div>
        </div>
      `);
    }

    // Placeholder oldalak
    function openAuslagerung(){ historyStack.push(goHome); setTitle('Auslagerung'); showBack(true); render(`<div class="step">Später ausfüllen.</div>`); }
    function openKommissionierung(){ historyStack.push(goHome); setTitle('Kommissionierung'); showBack(true); render(`<div class="step">Später ausfüllen.</div>`); }
    function openRetouren(){ historyStack.push(goHome); setTitle('Retouren'); showBack(true); render(`<div class="step">Später ausfüllen.</div>`); }
    function openScannerFehler(){ historyStack.push(goHome); setTitle('Scanner Fehler'); showBack(true); render(`<div class="step">Später ausfüllen.</div>`); }
    function openPlatzCodes(){ historyStack.push(goHome); setTitle('Platz Codes'); showBack(true); render(`<div class="step">Später ausfüllen.</div>`); }

    goHome();
  </script>
</body>
</html>
