<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codes</title>

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#003A70">

  <!-- iPhone ikon -->
  <link rel="apple-touch-icon" href="codes-192.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #003A70; /* Dachser kék */
      color: white;
    }

    header {
      background: #003A70;
      color: white;
      padding: 15px;
      font-size: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #FFC800;
    }

    #backBtn {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
    }

    .hidden { display: none; }

    .menu-list, .steps-list {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-btn {
      padding: 15px;
      font-size: 18px;
      border: none;
      background: #FFC800; /* sárga */
      color: #003A70;       /* kék szöveg */
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .step {
      background: #FFC800;
      padding: 15px;
      border-radius: 8px;
      font-size: 18px;
      color: #003A70;
      border-left: 5px solid white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- TELEPÍTŐ KÉPERNYŐ -->
<div id="installScreen" style="
  background:#003A70;
  color:white;
  padding:25px;
  text-align:center;
  font-family:Arial;
">
  <h2 style="margin-top:0;">Codes – Installation</h2>

  <p style="font-size:18px;">
    Installiere die App für schnellen Zugriff.
  </p>

  <button onclick="showInstallHelp()" style="
    background:#FFC800;
    color:#003A70;
    padding:15px 20px;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    width:90%;
    max-width:300px;
  ">
    📲 App installieren
  </button>
</div>

<div id="installHelp" class="hidden" style="
  background:#003A70;
  color:white;
  padding:25px;
  text-align:center;
  font-family:Arial;
">
  <h3>iPhone Installation</h3>
  <p style="font-size:17px;">
    1. Tippe unten auf das <b>Teilen</b> Symbol.<br>
    2. Wähle <b>Zum Home-Bildschirm</b>.<br>
    3. Fertig – die App erscheint auf deinem Startbildschirm.
  </p>

  <button onclick="hideInstallHelp()" style="
    background:#FFC800;
    color:#003A70;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    width:90%;
    max-width:300px;
  ">
    Zurück
  </button>
</div>

<script>
  function showInstallHelp(){
    document.getElementById('installHelp').classList.remove('hidden');
  }
  function hideInstallHelp(){
    document.getElementById('installHelp').classList.add('hidden');
  }

  // Telepítő képernyő csak első megnyitáskor jelenjen meg
  if(localStorage.getItem('codesInstalled') === 'yes'){
    document.getElementById('installScreen').style.display = 'none';
  }

  // Ha telepítve van → elrejti
  window.addEventListener('beforeinstallprompt', () => {
    localStorage.setItem('codesInstalled', 'yes');
    document.getElementById('installScreen').style.display = 'none';
  });
</script>

<!-- FŐ APP -->
<header>
  <button id="backBtn" class="hidden" onclick="goBack()">←</button>
  <div id="title">Codes</div>
</header>

<div id="content"></div>

<script>
  const historyStack = [];

  function setTitle(t){ document.getElementById('title').textContent = t; }
  function showBack(b){ document.getElementById('backBtn').classList.toggle('hidden', !b); }
  function render(html){ document.getElementById('content').innerHTML = html; }

  function goHome(){
    historyStack.length = 0;
    setTitle('Hauptseite');
    showBack(false);
    render(`
      <div class="menu-list">
        <button class="menu-btn" onclick="openHallenaufnahme()">1 – Hallenaufnahme</button>
        <button class="menu-btn" onclick="openWareneingang()">2 – Wareneingang</button>
      </div>
    `);
  }

  function goBack(){
    if(historyStack.length===0){ goHome(); return; }
    const last = historyStack.pop();
    last();
  }

  /* --- WARNEINGANG MENÜ --- */
  function openWareneingang(){
    historyStack.push(goHome);
    setTitle('Wareneingang');
    showBack(true);
    render(`
      <div class="menu-list">
        <button class="menu-btn" onclick="openWE3()">Wareneingang Prozess</button>
        <button class="menu-btn" onclick="openWE_F7()">Wareneingang F7 Prozess</button>
      </div>
    `);
  }

  function openWE3(){
    historyStack.push(openWareneingang);
    setTitle('Wareneingang Prozess');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">Barcode scannen → ENTER</div>
        <div class="step">Scanner zeigt Info (Tour + Platz)</div>
        <div class="step">Platznummer auf Palette schreiben</div>
        <div class="step">Palette auf richtigen Platz stellen</div>
        <div class="step">
          Wenn kein Platz →
          <span onclick="openCode15_fromWE3()" style="text-decoration:underline; cursor:pointer;">
            Platzwechseln
          </span>
        </div>
        <div class="step">ENTER</div>
      </div>
    `);
  }

  function openCode15_fromWE3(){
    historyStack.push(openWE3);
    openCode15();
  }

  function openWE_F7(){
    historyStack.push(openWareneingang);
    setTitle('Wareneingang F7 Prozess');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">1 → ENTER</div>
        <div class="step">ENTER</div>
        <div class="step">F7 drücken</div>
        <div class="step">Barcode scannen → ENTER → ENTER → ENTER</div>
        <div class="step">Nochmal gleichen Barcode scannen</div>
        <div class="step">Scanner zeigt Info (Tour + Platz)</div>
        <div class="step">Platznummer auf Palette schreiben</div>
        <div class="step">Palette auf richtigen Platz stellen</div>
        <div class="step">
          Wenn kein Platz →
          <span onclick="openCode15_fromWEF7()" style="text-decoration:underline; cursor:pointer;">
            Platzwechseln
          </span>
        </div>
        <div class="step">ENTER</div>
      </div>
    `);
  }

  function openCode15_fromWEF7(){
    historyStack.push(openWE_F7);
    openCode15();
  }

  /* --- HALLENAUFNAHME MENÜ --- */
  function openHallenaufnahme(){
    historyStack.push(goHome);
    setTitle('5.5.1 – Auswahl');
    showBack(true);
    render(`
      <div class="menu-list">
        <button class="menu-btn" onclick="openCode5()">5 – 2. Tour / Freigegeben</button>
        <button class="menu-btn" onclick="openCode6()">6 – Rausladen</button>
        <button class="menu-btn" onclick="openCode7()">7 – Entladen</button>
        <button class="menu-btn" onclick="openCode8()">8 – Sonderprozess Start</button>
        <button class="menu-btn" onclick="openCode9()">9 – Sonderprozess Ende</button>
        <button class="menu-btn" onclick="openCode13()">13 – Hallenaufnahme</button>
        <button class="menu-btn" onclick="openCode15()">15 – Platzwechseln</button>
      </div>
    `);
  }

  /* --- CODE 5 --- */
  function openCode5(){
    historyStack.push(openHallenaufnahme);
    setTitle('5 – 2. Tour / Freigegeben');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">5 → ENTER</div>
        <div class="step">5 → ENTER</div>
        <div class="step">1 → ENTER</div>
        <div class="step">5 → ENTER</div>
        <div class="step">Barcode scannen → ENTER</div>
        <div class="step">Scanner zeigt Info (Tour + Platz)</div>
        <div class="step">Palette auf Platz stellen → ENTER</div>
        <div class="step">Platz eingeben (z. B. 226) → ENTER</div>
        <div class="step">Nächste Palette gleich machen</div>
      </div>
    `);
  }

  /* --- CODE 6 --- */
  function openCode6(){
    historyStack.push(openHallenaufnahme);
    setTitle('6 – Rausladen');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">5 → ENTER</div>
        <div class="step">5 → ENTER</div>
        <div class="step">1 → ENTER</div>
        <div class="step">6 → ENTER</div>
        <div class="step">Barcode scannen → ENTER</div>
        <div class="step">Brücke‑Nummer eingeben / QR‑Code scannen → ENTER</div>
      </div>
    `);
  }

  /* --- CODE 7 --- */
  function openCode7(){
    historyStack.push(openHallenaufnahme);
    setTitle('7 – Entladen');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">5 → ENTER</div>
        <div class="step">5 → ENTER</div>
        <div class="step">1 → ENTER</div>
        <div class="step">7 → ENTER</div>
        <div class="step">Barcode scannen → ENTER</div>
        <div class="step">Scanner zeigt Platz (z. B. 360)</div>
        <div class="step">Palette auf Platz stellen → ENTER</div>
        <div class="step">Platz eingeben (360) → ENTER</div>
        <div class="step">Nächste Palette gleich machen</div>
      </div>
    `);
  }

  /* --- CODE 8 --- */
  function openCode8(){
    historyStack.push(openHallenaufnahme);
    setTitle('8 – Sonderprozess Start');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">5 → ENTER</div>
        <div class="step">5 → ENTER</div>
        <div class="step">1 → ENTER</div>
        <div class="step">8 → ENTER</div>
        <div class="step">Barcode scannen → ENTER</div>
        <div class="step">Scanner schreibt: Barcode ist überzählig → ENTER</div>
        <div class="step">F10 drücken</div>
        <div class="step">Option wählen (z. B. 9 – Reinigung) → ENTER</div>
      </div>
    `);
  }

  /* --- CODE 9 --- */
  function openCode9(){
    historyStack.push(openHallenaufnahme);
    setTitle('9 – Sonderprozess Ende');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">5 → ENTER</div>
        <div class="step">5 → ENTER</div>
        <div class="step">1 → ENTER</div>
        <div class="step">9 → ENTER</div>
        <div class="step">Gleichen Barcode scannen wie im Start → ENTER</div>
        <div class="step">Scanner schreibt: Barcode ist überzählig → ENTER</div>
        <div class="step">F10 drücken</div>
        <div class="step">Option wählen (z. B. 9 – Reinigung) → ENTER</div>
      </div>
    `);
  }

  /* --- CODE 13 --- */
  function openCode13(){
    historyStack.push(openHallenaufnahme);
    setTitle('13 – Hallenaufnahme');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">5 → ENTER</div>
        <div class="step">5 → ENTER</div>
        <div class="step">1 → ENTER</div>
        <div class="step">13 → ENTER</div>
        <div class="step">Barcode scannen → ENTER</div>
        <div class="step">Scanner zeigt Tour + Platz (z. B. 9336 / 220)</div>
        <div class="step">Wenn 2. Tour / Freigegeben → letzte 2 Tour-Zahlen auf Palette schreiben → ENTER</div>
        <div class="step">Platz eingeben (z. B. 220) → ENTER</div>
      </div>
    `);
  }

  /* --- CODE 15 --- */
  function openCode15(){
    setTitle('15 – Platzwechseln');
    showBack(true);
    render(`
      <div class="steps-list">
        <div class="step">5 → ENTER</div>
        <div class="step">5 → ENTER</div>
        <div class="step">1 → ENTER</div>
        <div class="step">15 → ENTER</div>
        <div class="step">Barcode scannen → ENTER</div>
        <div class="step">Scanner zeigt Info (Tour + Platz)</div>
        <div class="step">Platz 224–225 voll → freien Platz suchen</div>
        <div class="step">Palette auf freien Platz stellen → ENTER</div>
        <div class="step">Platz eingeben (z. B. 227) → ENTER</div>
      </div>
    `);
  }

  goHome();
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
  }
</script>

</body>
</html>
