<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Dachser – Scanner Menü</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.webmanifest" />

  <!-- iOS / Android színek -->
  <meta name="theme-color" content="#003A70" />

  <style>
    :root {
      --dachser-blue: #003A70;
      --dachser-blue-dark: #00284D;
      --dachser-yellow: #FFCC00;
      --text-light: #FFFFFF;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: var(--dachser-blue);
      color: var(--dachser-yellow);
    }

    .topbar {
      width: 100%;
      padding: 12px 16px;
      background: var(--dachser-blue-dark);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-title {
      margin: 0;
      font-size: 20px;
      color: var(--dachser-yellow);
      text-align: center;
      flex: 1;
    }

    .icon-btn {
      font-size: 26px;
      color: var(--dachser-yellow);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
    }

    .icon-btn.hidden {
      visibility: hidden;
    }

    #content {
      padding: 16px;
    }

    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-btn {
      background: var(--dachser-yellow);
      color: var(--dachser-blue);
      padding: 16px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      text-align: left;
      width: 100%;
    }

    .steps-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .step-card {
      background: var(--dachser-yellow);
      color: var(--dachser-blue);
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
    }

    .bottom-back {
      position: fixed;
      bottom: 16px;
      left: 16px;
      font-size: 30px;
      color: var(--dachser-yellow);
      cursor: pointer;
    }

    .bottom-back.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button id="homeBtn" class="icon-btn" onclick="goHome()">🏠</button>
    <h1 id="title" class="topbar-title">Hauptseite</h1>
    <!-- jobb oldalra placeholder, hogy a cím középen maradjon -->
    <span style="width:26px;"></span>
  </div>

  <div id="content"></div>

  <div id="backBtn" class="bottom-back hidden" onclick="goBack()">⬅️</div>

  <script>
    const historyStack = [];

    function setTitle(text) {
      document.getElementById('title').textContent = text;
    }

    function showBack(show) {
      const back = document.getElementById('backBtn');
      back.classList.toggle('hidden', !show);
    }

    function render(contentHtml) {
      document.getElementById('content').innerHTML = contentHtml;
    }

    function goHome() {
      historyStack.length = 0;
      setTitle('Hauptseite');
      showBack(false);
      renderHauptseite();
    }

    function goBack() {
      if (historyStack.length === 0) {
        goHome();
        return;
      }
      const last = historyStack.pop();
      last();
    }

    // --- OLDALAK ---

    function renderHauptseite() {
      render(`
        <div class="menu-list">
          <button class="menu-btn" onclick="openHallenaufnahme()">1 – Hallenaufnahme</button>
          <button class="menu-btn" onclick="openAuslagerung()">2 – Auslagerung</button>
          <button class="menu-btn" onclick="openKommissionierung()">3 – Kommissionierung</button>
          <button class="menu-btn" onclick="openRetouren()">4 – Retouren</button>
          <button class="menu-btn" onclick="openScannerFehler()">5 – Scanner Fehler / Codes</button>
          <button class="menu-btn" onclick="openPlatzCodes()">6 – Platz Codes</button>
        </div>
      `);
    }

    function openHallenaufnahme() {
      historyStack.push(renderHauptseite);
      setTitle('5.5.1 – Auswahl');
      showBack(true);
      render(`
        <div class="menu-list">
          <button class="menu-btn" onclick="openCode6()">6 – Rausladen</button>
          <button class="menu-btn" onclick="openCode7()">7 – Entladen</button>
          <button class="menu-btn" onclick="openCode13()">13 – Hallenaufnahme</button>
          <button class="menu-btn" onclick="openCode15()">15 – Platzwechseln</button>
        </div>
      `);
    }

    function openCode13() {
      historyStack.push(openHallenaufnahme);
      setTitle('13 – Hallenaufnahme');
      showBack(true);
      render(`
        <div class="steps-list">
          <div class="step-card">1. 5 → ENTER</div>
          <div class="step-card">2. 5 → ENTER</div>
          <div class="step-card">3. 1 → ENTER</div>
          <div class="step-card">4. 13 → ENTER</div>
          <div class="step-card">5. Barcode scannen → ENTER</div>
          <div class="step-card">6. Tournummer / Platz erscheint</div>
          <div class="step-card">7. Platz eingeben (z. B. 223)</div>
          <div class="step-card">8. Wenn Tour 2 → letzte 2 Zahlen auf Palette schreiben</div>
          <div class="step-card">9. Wenn nicht Tour 2 → bleibt auf Platz</div>
        </div>
      `);
    }

    // Placeholder a többihez – később töltjük ki
    function openCode6() {
      historyStack.push(openHallenaufnahme);
      setTitle('6 – Rausladen');
      showBack(true);
      render(`<div class="steps-list"><div class="step-card">Rausladen – später ausfüllen.</div></div>`);
    }

    function openCode7() {
      historyStack.push(openHallenaufnahme);
      setTitle('7 – Entladen');
      showBack(true);
      render(`<div class="steps-list"><div class="step-card">Entladen – später ausfüllen.</div></div>`);
    }

    function openCode15() {
      historyStack.push(openHallenaufnahme);
      setTitle('15 – Platzwechseln');
      showBack(true);
      render(`<div class="steps-list"><div class="step-card">Platzwechseln – später ausfüllen.</div></div>`);
    }

    function openAuslagerung() {
      historyStack.push(renderHauptseite);
      setTitle('Auslagerung');
      showBack(true);
      render(`<div class="steps-list"><div class="step-card">Auslagerung – später ausfüllen.</div></div>`);
    }

    function openKommissionierung() {
      historyStack.push(renderHauptseite);
      setTitle('Kommissionierung');
      showBack(true);
      render(`<div class="steps-list"><div class="step-card">Kommissionierung – später ausfüllen.</div></div>`);
    }

    function openRetouren() {
      historyStack.push(renderHauptseite);
      setTitle('Retouren');
      showBack(true);
      render(`<div class="steps-list"><div class="step-card">Retouren – später ausfüllen.</div></div>`);
    }

    function openScannerFehler() {
      historyStack.push(renderHauptseite);
      setTitle('Scanner Fehler / Codes');
      showBack(true);
      render(`<div class="steps-list"><div class="step-card">Scanner Fehler – später ausfüllen.</div></div>`);
    }

    function openPlatzCodes() {
      historyStack.push(renderHauptseite);
      setTitle('Platz Codes');
      showBack(true);
      render(`<div class="steps-list"><div class="step-card">Platz Codes – später ausfüllen.</div></div>`);
    }

    // indulás
    goHome();

    // PWA service worker regisztráció
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
